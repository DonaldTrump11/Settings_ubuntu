# -*- mode: tmux -*-
# Конфигурация tmux для работы с Neovim

# Установить префикс на Ctrl+Space (менее конфликтный чем Ctrl+b)
set -g prefix C-a
unbind C-b
bind-key C-a send-prefix

# Включить поддержку мыши
set -g mouse on

# Нумерация окон с 1 (не с 0)
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# История команд (больше строк)
set -g history-limit 10000

# Тема оформления
set -g status-style 'bg=#333333 fg=#ffffff'
set -g window-status-current-style 'bg=#0088cc fg=#ffffff bold'
set -g window-status-style 'bg=#444444 fg=#aaaaaa'
set -g status-right '#{?client_prefix,⌨️ ,} %H:%M | %d-%b-%y'
set -g status-left ' '#S' '

# Уведомления
set -g monitor-activity on
set -g visual-activity off

# Быстрое переключение между окнами
bind -r h select-window -t :-  # Предыдущее окно
bind -r l select-window -t :+  # Следующее окно

# Изменение размеров панелей
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5

# Разделение окон с сохранением текущего пути
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"


# Выход из copy-mode с Esc
bind-key -T copy-mode-vi Escape send-keys -X cancel

# Использовать vi-режим для копирования
set-window-option -g mode-keys vi

# Настройки для скроллинга в Neovim и tmux
set-option -g default-terminal "tmux-256color"
set-option -sa terminal-overrides ",xterm*:Tc"
set-option -ga terminal-overrides ",xterm*:RGB"
set-option -ga terminal-overrides ",*256col*:RGB"

# Ключи для начала выделения
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel




# Копирование в системный буфер через xclip/xsel
# bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel 'xsel -i -b'
# bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel 'xsel -i -b'






# Горячие клавиши для копирования текста
# Ctrl+Shift+c - копировать выделенное (в режиме copy-mode)
bind-key -n C-S-c run-shell "tmux save-buffer - | xsel -i -b"

# Ctrl+c - копировать из активной панели (альтернативный вариант)
bind-key -n C-c if-shell -F '#{selection_present}' {
    send-keys -X copy-pipe-and-cancel 'xsel -i -b'
} {
    send-keys C-c
}

# Вставка из системного буфера
bind-key -n C-S-v run-shell "xsel -o -b | tmux load-buffer - ; tmux paste-buffer"

# Настройка скроллинга для работы с Neovim
# При включенной поддержке мыши в tmux:
set -g @plugin 'nhdaly/tmux-better-mouse-mode'

# Настройки для плагина мыши (если установлен)
set -g @scroll-without-changing-pane on
set -g @emulate-scroll-for-no-mouse-alternate-buffer on

# Оптимизация для Neovim - включить проходные клавиши
set -g focus-events on

# Настройки для правильной работы цветов
set -g default-terminal "screen-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# Поддержка true color для Neovim
set -sa terminal-overrides ',*:Tc'
set -sa terminal-overrides ',*:RGB'

# Восстановление сессий
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Автосохранение/восстановление
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# Режим vim для поиска
bind-key / copy-mode \; send-keys ?
bind-key ? copy-mode \; send-keys /

# Переименование окна
bind-key r command-prompt -I "#W" "rename-window '%%'"

# Показать все ключевые биндинги
bind-key ? list-keys

# Перезагрузить конфигурацию
bind-key R source-file ~/.tmux.conf \; display-message "Config reloaded"

# Плагины через TPM (если установлен)
# Для установки TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# set -g @plugin 'tmux-plugins/tpm'
# set -g @plugin 'tmux-plugins/tmux-sensible'
# set -g @plugin 'christoomey/vim-tmux-navigator'
# run '~/.tmux/plugins/tpm/tpm'



##### OSC52 clipboard #####

# Включаем copy-mode на vi
setw -g mode-keys vi

# Копирование через OSC52
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "tmux load-buffer - && tmux display-message 'Copied (OSC52)'"

# Автокопирование при выделении мышью
bind -T copy-mode-vi MouseDragEnd1Pane send -X copy-pipe-and-cancel "tmux load-buffer -"
